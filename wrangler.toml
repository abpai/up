name = "up"
main = "src/worker/index.js"
compatibility_date = "2026-03-27"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Bindings for R2 and D1
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "up-storage" # Placeholder name, user must create/update this

[[d1_databases]]
binding = "DB"
database_name = "up-db" # Placeholder name, user must create/update this
database_id = "replace-with-your-db-id"

[vars]
CORS = "https://up.andypai.me"
